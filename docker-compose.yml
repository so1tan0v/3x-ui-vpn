services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3x-ui
    hostname: 3x-ui
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./data/etc-x-ui:/etc/x-ui
      - ./data/certs:/root/cert
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    tty: true
    ports:
      - "14523:14523"
      - "2096:2096"
      - "2053:2053"
    restart: unless-stopped
